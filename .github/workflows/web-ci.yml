name: web-ci

# Build the web SPA and the Astro landing page on any change to either.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "landing/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - "landing/**"
      - ".github/workflows/web-ci.yml"

jobs:
  build:
    name: build ${{ matrix.dir }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: [web, landing]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build
        run: bun run build
