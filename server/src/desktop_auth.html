<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sharp — desktop login</title>
    <style>
      :root {
        --ink: #0f1115; --panel: #191c22; --border: #2a2f38;
        --text: #e6e8eb; --dim: #9aa3af; --faint: #6b7280;
        --accent: #4f46e5; --accent-hover: #6366f1; --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; align-items: center;
        justify-content: center; background: var(--ink); color: var(--text);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
      }
      .card { width: 100%; max-width: 360px; }
      .brand { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 28px; }
      .logo {
        height: 56px; width: 56px; display: flex; align-items: center; justify-content: center;
        border-radius: 12px; background: var(--panel); color: var(--accent);
        font-size: 30px; font-weight: 800; box-shadow: inset 0 0 0 1px var(--border);
      }
      h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
      .sub { color: var(--dim); font-size: 13px; margin: 0; }
      form { display: flex; flex-direction: column; gap: 12px; }
      label { display: flex; flex-direction: column; gap: 6px; }
      label span { font-size: 12px; font-weight: 500; color: var(--dim); }
      input {
        border: 1px solid var(--border); background: var(--panel); color: var(--text);
        border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none;
      }
      input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,70,229,0.35); }
      button {
        margin-top: 8px; border: 0; border-radius: 8px; background: var(--accent);
        color: #fff; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
      }
      button:hover { background: var(--accent-hover); }
      button:disabled { opacity: 0.6; cursor: default; }
      .msg { text-align: center; color: var(--dim); font-size: 13px; margin-top: 4px; }
      .err { color: var(--danger); }
      .open-btn {
        display: block; text-align: center; text-decoration: none; margin-top: 16px;
        border-radius: 8px; background: var(--accent); color: #fff; padding: 10px 16px;
        font-size: 14px; font-weight: 600;
      }
      .secondary { width: 100%; background: transparent; border: 1px solid var(--border); }
      .secondary:hover { background: var(--panel); }
      .or { display: flex; align-items: center; gap: 10px; margin: 14px 0; color: var(--faint); font-size: 12px; }
      .or:before, .or:after { content: ''; height: 1px; flex: 1; background: var(--border); }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <div class="logo">#</div>
        <h1>sharp</h1>
        <p class="sub">Sign in to open the desktop app</p>
      </div>

      <form id="form">
        <label>
          <span>Email</span>
          <input id="email" type="email" autocomplete="email" required placeholder="you@example.com" />
        </label>
        <label>
          <span>Password</span>
          <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
        </label>
        <button id="submit" type="submit">Sign in</button>
        <p id="error" class="msg err hidden"></p>
      </form>

      <div id="passkeyLogin" class="hidden">
        <div class="or">or</div>
        <button id="passkeyButton" class="secondary" type="button">Sign in with passkey</button>
      </div>

      <div id="setup" class="hidden">
        <h1>Set up a passkey?</h1>
        <p class="sub" style="margin:8px 0 16px">Use Face ID, Touch ID, Windows Hello, or a security key next time.</p>
        <label><span>Passkey name</span><input id="passkeyName" maxlength="80" value="My passkey" /></label>
        <button id="setupButton" type="button" style="width:100%">Create passkey</button>
        <button id="skipButton" class="secondary" type="button">Not now</button>
        <p id="setupError" class="msg err hidden"></p>
      </div>

      <div id="done" class="hidden">
        <p class="msg">Opening the sharp app… You can close this tab.</p>
        <a id="openLink" class="open-btn" href="#">Open sharp</a>
      </div>
    </div>

    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var state = params.get('state') || '';
        var scheme = params.get('scheme') || 'sharp';
        var form = document.getElementById('form');
        var errEl = document.getElementById('error');
        var btn = document.getElementById('submit');
        var doneEl = document.getElementById('done');
        var openLink = document.getElementById('openLink');
        var passkeyLogin = document.getElementById('passkeyLogin');
        var passkeyButton = document.getElementById('passkeyButton');
        var setup = document.getElementById('setup');
        var setupButton = document.getElementById('setupButton');
        var skipButton = document.getElementById('skipButton');
        var setupError = document.getElementById('setupError');
        var pendingToken = null;
        var pendingPassword = null;

        function showError(msg) {
          errEl.textContent = msg;
          errEl.classList.remove('hidden');
        }

        function finish(code) {
          var url = scheme + '://auth?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
          openLink.href = url;
          form.classList.add('hidden');
          doneEl.classList.remove('hidden');
          location.href = url;
        }

        function api(path, options) {
          return fetch('/api/v1' + path, options).then(function (r) {
            if (r.status === 204) return null;
            return r.json().then(function (d) {
              if (!r.ok) throw new Error((d.error && d.error.message) || 'Request failed');
              return d;
            });
          });
        }

        function b64decode(value) {
          var base64 = value.replace(/-/g, '+').replace(/_/g, '/');
          while (base64.length % 4) base64 += '=';
          var binary = atob(base64), bytes = new Uint8Array(binary.length);
          for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          return bytes.buffer;
        }

        function b64encode(value) {
          if (!value) return null;
          var bytes = new Uint8Array(value), binary = '';
          for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
          return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        function createOptions(raw) {
          var options = raw;
          options.challenge = b64decode(options.challenge);
          options.user.id = b64decode(options.user.id);
          if (options.excludeCredentials) options.excludeCredentials.forEach(function (c) { c.id = b64decode(c.id); });
          return options;
        }

        function getOptions(raw) {
          var options = raw;
          options.challenge = b64decode(options.challenge);
          if (options.allowCredentials) options.allowCredentials.forEach(function (c) { c.id = b64decode(c.id); });
          return options;
        }

        function registrationJSON(credential) {
          return { id: credential.id, rawId: b64encode(credential.rawId), type: credential.type,
            authenticatorAttachment: credential.authenticatorAttachment,
            response: { attestationObject: b64encode(credential.response.attestationObject), clientDataJSON: b64encode(credential.response.clientDataJSON), transports: credential.response.getTransports ? credential.response.getTransports() : [] },
            extensions: credential.getClientExtensionResults() };
        }

        function authenticationJSON(credential) {
          return { id: credential.id, rawId: b64encode(credential.rawId), type: credential.type,
            authenticatorAttachment: credential.authenticatorAttachment,
            response: { authenticatorData: b64encode(credential.response.authenticatorData), clientDataJSON: b64encode(credential.response.clientDataJSON), signature: b64encode(credential.response.signature), userHandle: b64encode(credential.response.userHandle) },
            extensions: credential.getClientExtensionResults() };
        }

        function finishWithToken(token) {
          return api('/auth/desktop/code', { method: 'POST', headers: { Authorization: 'Bearer ' + token } })
            .then(function (d) { finish(d.code); });
        }

        function offerSetup(token, password) {
          return api('/auth/passkeys', { headers: { Authorization: 'Bearer ' + token } }).then(function (d) {
            if (!d.enabled || d.prompt_dismissed || d.passkeys.length) return finishWithToken(token);
            pendingToken = token;
            pendingPassword = password;
            form.classList.add('hidden');
            passkeyLogin.classList.add('hidden');
            setup.classList.remove('hidden');
          });
        }

        api('/auth/passkeys/config').then(function (d) {
          if (d.enabled && window.isSecureContext && window.PublicKeyCredential) passkeyLogin.classList.remove('hidden');
        }).catch(function () {});

        passkeyButton.addEventListener('click', function () {
          if (!state) { showError('Missing sign-in state. Return to the app and try again.'); return; }
          errEl.classList.add('hidden'); passkeyButton.disabled = true;
          api('/auth/passkeys/login/start', { method: 'POST' })
            .then(function (challenge) { return navigator.credentials.get({ publicKey: getOptions(challenge.options.publicKey) }).then(function (credential) { return api('/auth/passkeys/login/finish', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ceremony_id: challenge.ceremony_id, credential: authenticationJSON(credential) }) }); }); })
            .then(function (d) { return finishWithToken(d.token); })
            .catch(function (error) { if (error.name !== 'NotAllowedError') showError(error.message || 'Passkey sign-in failed.'); passkeyButton.disabled = false; });
        });

        setupButton.addEventListener('click', function () {
          var name = document.getElementById('passkeyName').value.trim();
          if (!name || !pendingPassword) return;
          setupButton.disabled = true; setupError.classList.add('hidden');
          api('/auth/passkeys', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + pendingToken }, body: JSON.stringify({ name: name, password: pendingPassword }) })
            .then(function (challenge) { return navigator.credentials.create({ publicKey: createOptions(challenge.options.publicKey) }).then(function (credential) { return api('/auth/passkeys/register/finish', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + pendingToken }, body: JSON.stringify({ ceremony_id: challenge.ceremony_id, credential: registrationJSON(credential) }) }); }); })
            .then(function () { pendingPassword = null; return finishWithToken(pendingToken); })
            .catch(function (error) { if (error.name !== 'NotAllowedError') { setupError.textContent = error.message || 'Could not add passkey.'; setupError.classList.remove('hidden'); } setupButton.disabled = false; });
        });

        skipButton.addEventListener('click', function () {
          api('/auth/passkeys/prompt/dismiss', { method: 'POST', headers: { Authorization: 'Bearer ' + pendingToken } }).catch(function () {}).then(function () { pendingPassword = null; return finishWithToken(pendingToken); });
        });

        form.addEventListener('submit', function (e) {
          e.preventDefault();
          errEl.classList.add('hidden');
          if (!state) { showError('Missing sign-in state. Return to the app and try again.'); return; }
          btn.disabled = true;
          btn.textContent = 'Please wait…';
          var email = document.getElementById('email').value.trim().toLowerCase();
          var password = document.getElementById('password').value;

          api('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password }),
          })
            .then(function (d) { return offerSetup(d.token, password); })
            .catch(function (err) {
              showError(err.message || 'Something went wrong.');
              btn.disabled = false;
              btn.textContent = 'Sign in';
            });
        });
      })();
    </script>
  </body>
</html>
