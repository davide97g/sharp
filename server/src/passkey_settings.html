<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>sharp — passkeys</title><style>
:root{color-scheme:dark;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0f1115;color:#e6e8eb;padding:24px}.card{width:min(100%,480px);background:#191c22;border:1px solid #2a2f38;border-radius:14px;padding:24px;box-sizing:border-box}h1{margin:0 0 6px;font-size:22px}p{color:#9aa3af}.list{border:1px solid #2a2f38;border-radius:8px;margin:18px 0}.item{display:flex;justify-content:space-between;gap:12px;padding:12px;border-bottom:1px solid #2a2f38}.item:last-child{border:0}button{border:0;border-radius:8px;background:#4f46e5;color:#fff;padding:10px 14px;font-weight:600;cursor:pointer}button.secondary{background:transparent;border:1px solid #2a2f38}button.danger{background:#b42318}button:disabled{opacity:.55}input{width:100%;box-sizing:border-box;background:#0f1115;color:#e6e8eb;border:1px solid #2a2f38;border-radius:8px;padding:10px;margin:6px 0 10px}label{display:block;color:#9aa3af;font-size:12px}.row{display:flex;gap:8px;align-items:center}.muted{font-size:12px;color:#6b7280}.error{color:#ff9b9b}.hidden{display:none}
</style></head><body><main class="card"><h1>Manage passkeys</h1><p>Use Face ID, Touch ID, Windows Hello, or a security key. Your password remains available for recovery.</p><div id="error" class="error"></div><section id="content" class="hidden"><div id="list" class="list"></div><label>New passkey name<input id="name" maxlength="80" value="My passkey"></label><label>Current password<input id="password" type="password" autocomplete="current-password"></label><button id="add">Add passkey</button><button id="close" class="secondary" style="margin-left:8px">Close</button></section><p id="loading">Opening secure passkey manager…</p></main><script>
(function(){'use strict';var api='/api/v1',token=null,error=document.getElementById('error'),content=document.getElementById('content'),loading=document.getElementById('loading'),list=document.getElementById('list'),name=document.getElementById('name'),password=document.getElementById('password'),add=document.getElementById('add');function fail(e){error.textContent=e&&e.message||'Could not open passkey manager.';loading.classList.add('hidden')}function b64(s){var x=s.replace(/-/g,'+').replace(/_/g,'/').padEnd(Math.ceil(s.length/4)*4,'=');var y=atob(x),a=new Uint8Array(y.length);for(var i=0;i<y.length;i++)a[i]=y.charCodeAt(i);return a.buffer}function enc(v){if(!v)return null;var a=new Uint8Array(v),s='';for(var i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}function json(c){var r=c.response;return{id:c.id,rawId:enc(c.rawId),type:c.type,authenticatorAttachment:c.authenticatorAttachment,response:{attestationObject:enc(r.attestationObject),clientDataJSON:enc(r.clientDataJSON),transports:typeof r.getTransports==='function'?r.getTransports():[]},extensions:c.getClientExtensionResults()}}function options(o){o=structuredClone(o);o.challenge=b64(o.challenge);o.user.id=b64(o.user.id);(o.excludeCredentials||[]).forEach(function(x){x.id=b64(x.id)});return o}async function call(path,opt){opt=opt||{};opt.headers=Object.assign({'Content-Type':'application/json','Authorization':'Bearer '+token},opt.headers||{});var r=await fetch(api+path,opt),d=await r.json().catch(function(){return{}});if(!r.ok)throw Error(d.error&&d.error.message||'Request failed');return d}async function load(){var d=await call('/auth/passkeys');list.innerHTML='';if(!d.passkeys.length)list.innerHTML='<div class="item muted">No passkeys enrolled.</div>';d.passkeys.forEach(function(p){var row=document.createElement('div');row.className='item';row.innerHTML='<span>'+esc(p.name)+'<br><small class="muted">Added '+new Date(p.created_at).toLocaleDateString()+'</small></span>';var actions=document.createElement('span');var rename=document.createElement('button');rename.className='secondary';rename.textContent='Rename';rename.onclick=async function(){var n=prompt('Passkey name',p.name);if(n&&n.trim())await call('/auth/passkeys/'+p.id,{method:'PATCH',body:JSON.stringify({name:n.trim()})}).then(load).catch(fail)};var remove=document.createElement('button');remove.className='danger';remove.textContent='Remove';remove.style.marginLeft='6px';remove.onclick=async function(){var pw=prompt('Current password');if(pw)await call('/auth/passkeys/'+p.id,{method:'DELETE',body:JSON.stringify({password:pw})}).then(load).catch(fail)};actions.append(rename,remove);row.append(actions);list.append(row)})}function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}add.onclick=async function(){if(!name.value.trim()||!password.value)return;add.disabled=true;try{var c=await call('/auth/passkeys',{method:'POST',body:JSON.stringify({name:name.value.trim(),password:password.value})});var o=options(c.options.publicKey);var cred=await navigator.credentials.create({publicKey:o});if(!cred)throw Error('Passkey setup cancelled.');await call('/auth/passkeys/register/finish',{method:'POST',body:JSON.stringify({ceremony_id:c.ceremony_id,credential:json(cred)})});password.value='';await load()}catch(e){if(!(e instanceof DOMException&&e.name==='NotAllowedError'))fail(e)}finally{add.disabled=false}};document.getElementById('close').onclick=function(){window.close()};(async function(){try{if(!window.isSecureContext||!window.PublicKeyCredential)throw Error('Passkeys require HTTPS and a supported browser.');var code=new URLSearchParams(location.search).get('code');if(!code)throw Error('Missing management code.');var d=await fetch(api+'/auth/passkeys/manage/exchange',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code})}).then(function(r){return r.json()});if(!d.token)throw Error(d.error&&d.error.message||'Invalid or expired management code.');token=d.token;history.replaceState(null,'',location.pathname);await load();loading.classList.add('hidden');content.classList.remove('hidden')}catch(e){fail(e)}})()})();
</script></body></html>
