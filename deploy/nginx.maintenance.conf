server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Every path serves the maintenance page, and with a 503 status +
    # Retry-After so monitors/crawlers see "temporarily unavailable", not "OK".
    location / {
        return 503;
    }

    error_page 503 @maintenance;
    location @maintenance {
        add_header Retry-After 120 always;
        add_header Cache-Control "no-store" always;
        try_files /index.html =503;
    }
}
