    background-size: cover;
    background-position: center;
    z-index: 0;
    transform: scale(1.05);
    animation: drift 40s ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: scale(1.05) translate(0, 0); }
    to   { transform: scale(1.12) translate(-1.5%, -1.2%); }
  }
  /* vignette + darkening so text stays readable over any part of the art */
  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 90% at 50% 62%, rgba(0,0,0,0) 30%, rgba(6,10,9,0.55) 100%),
      linear-gradient(180deg, rgba(6,10,9,0.35) 0%, rgba(6,10,9,0.15) 45%, rgba(6,10,9,0.65) 100%);
  }
  .card {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: clamp(1.5rem, 5vw, 3rem);
    max-width: 40rem;
    margin: 1.25rem;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--amber);
    padding: 0.4rem 0.9rem;
    border: 1px solid rgba(255, 179, 71, 0.35);
    border-radius: 999px;
    background: rgba(20, 14, 8, 0.35);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 10px 2px var(--amber-glow);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(0.85); }
    50%      { opacity: 1;   transform: scale(1.15); }
  }
  h1 {
    margin: 1.4rem 0 0.75rem;
    font-size: clamp(2.1rem, 6.5vw, 3.6rem);
    line-height: 1.05;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fff;
    text-shadow: 0 2px 24px rgba(0, 0, 0, 0.55), 0 0 42px rgba(255, 154, 60, 0.18);
  }
  h1 .glow { color: var(--amber); text-shadow: 0 0 30px rgba(255, 154, 60, 0.55); }
  p {
    font-size: clamp(1rem, 2.5vw, 1.18rem);
    line-height: 1.6;
    color: var(--mist);
    max-width: 32rem;
    margin: 0 auto;
    text-shadow: 0 1px 16px rgba(0, 0, 0, 0.6);
  }
  .sub {
    margin-top: 1.6rem;
    font-size: 0.9rem;
    color: var(--mist-dim);
  }
  .rule {
    width: 3rem; height: 2px;
    margin: 1.8rem auto 0;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0.7;
  }
  @media (prefers-reduced-motion: reduce) {
    .bg, .dot { animation: none; }
  }
</style>
</head>
<body>
  <div class="bg" role="img" aria-label="A glowing rubber duck floating in an enchanted forest pond"></div>

  <main class="card">
    <span class="badge"><span class="dot"></span>Maintenance in progress</span>
    <h1>We'll be <span class="glow">right back</span>.</h1>
    <p>
      sharp is down for a short bit while we ship an upgrade.
      Your messages, channels, and docs are safe — nothing is lost.
      Grab a coffee; we'll have the lights back on shortly.
    </p>
    <div class="rule"></div>
    <p class="sub">Thanks for your patience. — the sharp team</p>
  </main>
</body>
</html>
