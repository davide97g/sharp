# sharp — full local stack in Docker (no Rust/Node needed on your machine).
# Everything (server + web UI) is built inside Docker and served at :3000.
#
#   cd deploy
#   docker compose -f docker-compose.local.yml up --build
#
# First build compiles the Rust server (~5-10 min); later builds use the cache.
# App: http://localhost:3000

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sharp
      POSTGRES_PASSWORD: sharp
      POSTGRES_DB: sharp
    volumes:
      - pg_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharp -d sharp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sharp
      MINIO_ROOT_PASSWORD: sharp-secret
    volumes:
      - minio_local_data:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 sharp sharp-secret; do echo 'waiting for minio'; sleep 1; done;
      mc mb -p local/sharp || true;
      exit 0;
      "

  sharp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://sharp:sharp@postgres:5432/sharp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-secret
      SHARP_DISABLE_SIGNUP: "false"
      WEBAUTHN_RP_ID: "localhost"
      WEBAUTHN_ORIGINS: "http://localhost:5173,http://localhost:3000"
      WEBAUTHN_RP_NAME: "Sharp"
      RUST_LOG: info
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: sharp
      S3_ACCESS_KEY: sharp
      S3_SECRET_KEY: sharp-secret
      S3_REGION: us-east-1
      S3_ALLOW_HTTP: "true"
      # Sharpy AI assistant (OpenAI-compatible) — optional; disabled when unset.
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4o-mini}
      AI_EMBED_MODEL: ${AI_EMBED_MODEL:-text-embedding-3-small}
      # Google Calendar (Phase 5) — optional. Set to a Google OAuth client with
      # redirect http://localhost:3000/api/v1/calendar/google/callback to test sync.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_local_data:
  minio_local_data:
