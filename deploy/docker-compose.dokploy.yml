# sharp — Dokploy compose file (split deployment: 3 subdomains)
#
# Dokploy runs its own Traefik reverse proxy with automatic HTTPS, so this file
# has NO caddy and publishes NO host ports. Route traffic via Dokploy's
# "Domains" tab (one domain per service):
#
#   sharp.davideghiotto.it          -> service `landing`,   port 80
#   app.sharp.davideghiotto.it      -> service `web`,       port 80
#   server.sharp.davideghiotto.it   -> service `sharp`,     port 3000  (websockets work out of the box)
#
# The `db-studio` (Drizzle Gateway) DB admin UI is deliberately NOT routed to a
# public domain — full read/write DB access must not sit on the open internet.
# It binds to the VPS loopback only (127.0.0.1:4983); reach it via an SSH tunnel.
# See "Database UI" in deploy/DOKPLOY.md.
#
# The web SPA is a separate static image that talks cross-origin to the API host
# (baked in via API_URL below). Server CORS is permissive + auth is a Bearer token,
# so cross-origin works with no extra config.
#
# Dokploy setup: see deploy/DOKPLOY.md

services:
  livekit:
    image: livekit/livekit-server:v1.13.1
    restart: unless-stopped
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        prometheus:
          port: 6789
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        turn:
          enabled: true
          domain: ${MEDIA_DOMAIN}
          udp_port: 3478
          tls_port: 5349
          cert_file: /etc/livekit/tls.crt
          key_file: /etc/livekit/tls.key
          ttl_seconds: 300
          relay_range_start: 30000
          relay_range_end: 30100
    volumes:
      - ${LIVEKIT_TURN_CERT_FILE}:/etc/livekit/tls.crt:ro
      - ${LIVEKIT_TURN_KEY_FILE}:/etc/livekit/tls.key:ro
    expose:
      - "7880"
    ports:
      - "7881:7881/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "30000-30100:30000-30100/udp"
      - "50000-50100:50000-50100/udp"
    networks:
      - dokploy-network
      - default

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sharp
      POSTGRES_DB: sharp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharp -d sharp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # API server (API-only image; the web SPA is the separate `web` service below).
  # Domain: server.sharp.davideghiotto.it -> port 3000.
  sharp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://sharp:${POSTGRES_PASSWORD}@postgres:5432/sharp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      LIVEKIT_URL: wss://${MEDIA_DOMAIN}
      LIVEKIT_INTERNAL_URL: http://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      SHARP_DISABLE_SIGNUP: ${SHARP_DISABLE_SIGNUP:-false}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_ORIGINS: ${WEBAUTHN_ORIGINS:-}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-Sharp}
      RUST_LOG: ${RUST_LOG:-info}
      # File uploads — Cloudflare R2 (S3-compatible). The bucket stays private:
      # sharp proxies every upload/download through its own API with channel
      # auth, so R2 needs no public access or custom domain. Set S3_ENDPOINT,
      # S3_ACCESS_KEY and S3_SECRET_KEY in the Environment tab (R2 API token
      # credentials — endpoint is https://<account_id>.r2.cloudflarestorage.com,
      # WITHOUT the bucket suffix).
      S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT in the Environment tab}
      S3_BUCKET: ${S3_BUCKET:-sharp}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY in the Environment tab}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY in the Environment tab}
      S3_REGION: ${S3_REGION:-auto}
      # Web push: VAPID keys auto-generate + persist on first startup, so these
      # can be left unset. To pin your own keypair, set both VAPID_PUBLIC_KEY and
      # VAPID_PRIVATE_KEY in the Environment tab (empty => auto-generate).
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@sharp.davideghiotto.it}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      # APNs (native macOS desktop app) — inert unless all set. Requires a paid
      # Apple Developer account: Team ID, .p8 auth-key ID + contents, bundle id.
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_PRIVATE_KEY: ${APNS_PRIVATE_KEY:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-dev.sharp.app}
      APNS_ENV: ${APNS_ENV:-production}
      # Password-reset email over SMTP — inert (link hidden) unless SMTP_HOST +
      # SMTP_FROM are set. SMTP_PORT defaults to 465 (implicit TLS); set
      # SMTP_TLS=starttls for 587. APP_URL is the public web URL used in email links.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-}
      APP_URL: ${APP_URL:-}
      # GIF search (server-side proxy). Key can also be saved from the in-app
      # Settings → Workspace tab (persisted in Postgres); these are the env
      # fallbacks. GIPHY is the default provider; Tenor is legacy-only.
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
      TENOR_API_KEY: ${TENOR_API_KEY:-}
      # Duck GIF suggestions (DeepSeek LLM) — duck is disabled when unset.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      # Sharpy AI assistant (OpenAI-compatible LLM + embeddings) — disabled when
      # AI_API_KEY is unset. Base URL works with OpenAI, DeepSeek, Ollama, etc.
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4o-mini}
      AI_EMBED_MODEL: ${AI_EMBED_MODEL:-text-embedding-3-small}
      # Optional separate live-transcription provider; each setting falls back to AI_*.
      # TRANSCRIBE_API_KEY: ${TRANSCRIBE_API_KEY:-}
      # TRANSCRIBE_BASE_URL: ${TRANSCRIBE_BASE_URL:-https://api.openai.com/v1}
      # TRANSCRIBE_MODEL: ${TRANSCRIBE_MODEL:-gpt-4o-mini-transcribe}
      # Google Calendar (Phase 5) — optional. Leave unset to disable calendar sync.
      # GOOGLE_REDIRECT_URI must exactly match a redirect registered on the OAuth
      # client and point at the API subdomain (split deploy):
      # https://<api-domain>/api/v1/calendar/google/callback
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
    expose:
      - "3000"
    depends_on:
      livekit:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - dokploy-network
      - default

  # Web SPA (static, nginx). The API base is baked in at build time — point it at
  # the API host's public URL. Domain: app.sharp.davideghiotto.it -> port 80.
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_URL: ${API_URL:-https://server.sharp.davideghiotto.it}
        # tldraw license key (removes the canvas watermark). Baked into the public
        # client bundle at build time, so it is not a secret. Override in the
        # Dokploy Environment tab if the key is rotated.
        VITE_TLDRAW_LICENSE_KEY: ${TLDRAW_LICENSE_KEY:-tldraw-2026-07-29/WyJJNFNEa0RIbCIsWyIqIl0sMTYsIjIwMjYtMDctMjkiXQ.HI3ay8fvFOqy6cMFRvrk5FpR1JmkiGpCb+50LFn/AWXVSf/1aeQJAHsnEFHJZ1X5By52D7ZRDNVB+6cRC3rhaQ}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - dokploy-network
      - default

  # Static landing page. Domain: sharp.davideghiotto.it (apex) -> port 80.
  landing:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.landing
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - dokploy-network
      - default

  # Always-on maintenance fallback for the app host. It owns a Traefik router on
  # the SAME host as `web`, but with the lowest priority (1). Whenever `web` is
  # up, its higher-priority router wins and this one is idle; when `web` goes
  # down (redeploy, crash), web's docker router disappears and Traefik falls back
  # to this router, serving deploy/maintenance.html with a 503. No manual steps,
  # no changes to the web/API/landing routes. Flips back automatically when web
  # returns.
  #
  # NOTE: `websecure` (entrypoint) and `letsencrypt` (certresolver) are Dokploy's
  # Traefik defaults. If your instance renamed them, change them below only.
  maintenance:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.maintenance
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - "traefik.http.routers.sharp-maint.rule=Host(`app.sharp.davideghiotto.it`)"
      - traefik.http.routers.sharp-maint.entrypoints=websecure
      - traefik.http.routers.sharp-maint.tls=true
      - traefik.http.routers.sharp-maint.tls.certresolver=letsencrypt
      - traefik.http.routers.sharp-maint.priority=1
      - traefik.http.routers.sharp-maint.service=sharp-maint
      - traefik.http.services.sharp-maint.loadbalancer.server.port=80

  # Drizzle Gateway: the official SELF-HOSTED Drizzle Studio — full DB admin UI
  # (browse tables, run SQL, edit data), behind its own master-password login.
  #
  # PRIVATE ONLY — NOT routed to a public domain. The port is bound to the VPS
  # loopback (127.0.0.1:4983), so it is unreachable from the internet even though
  # the container is running. Access it from your laptop via an SSH tunnel:
  #   ssh -N -L 4983:127.0.0.1:4983 <user>@<vps-host>
  #   then open http://127.0.0.1:4983, log in with MASTERPASS.
  # Add the DB connection INSIDE the UI (persists in the volume):
  #   host = postgres   port = 5432   user = sharp   db = sharp
  #   password = <POSTGRES_PASSWORD>   (reached over the `default` network)
  db-studio:
    image: ghcr.io/drizzle-team/gateway:latest
    restart: unless-stopped
    environment:
      PORT: "4983"
      STORE_PATH: /app        # volume mount below; holds session + saved DBs
      MASTERPASS: ${MASTERPASS:?set MASTERPASS in the Environment tab}
    volumes:
      - drizzle_gateway:/app
    # Loopback-only publish: reachable from the VPS itself (for the SSH tunnel),
    # never from the public internet. Do NOT change to 0.0.0.0.
    ports:
      - "127.0.0.1:4983:4983"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default          # to reach the Postgres service by name (no Traefik route)

networks:
  dokploy-network:
    external: true

volumes:
  postgres_data:
  redis_data:
  drizzle_gateway:
