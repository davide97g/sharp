# sharp — Dokploy compose file
#
# Dokploy runs its own Traefik reverse proxy with automatic HTTPS, so this file
# has NO caddy and publishes NO host ports. Route traffic via Dokploy's
# "Domains" tab: service `sharp`, port 3000 (websockets work out of the box).
#
# Dokploy setup: see deploy/DOKPLOY.md

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sharp
      POSTGRES_DB: sharp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharp -d sharp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # Object storage for file uploads. Internal only — sharp streams files through
  # its own API, so MinIO needs no Domain/public port. To use an external
  # S3/R2/B2 instead, delete this service + createbuckets and point the S3_*
  # vars on `sharp` at your provider.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sharp}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY in the Environment tab}
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-sharp} ${S3_SECRET_KEY}; do echo 'waiting for minio'; sleep 1; done;
      mc mb -p local/${S3_BUCKET:-sharp} || true;
      exit 0;
      "

  sharp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://sharp:${POSTGRES_PASSWORD}@postgres:5432/sharp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SHARP_DISABLE_SIGNUP: ${SHARP_DISABLE_SIGNUP:-false}
      RUST_LOG: ${RUST_LOG:-info}
      # File uploads (S3-compatible object storage — MinIO above).
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-sharp}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-sharp}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ALLOW_HTTP: "true"
      # Web push: VAPID keys auto-generate + persist on first startup. Only the
      # subject (contact URL) is configurable here.
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@sharp.app}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - dokploy-network
      - default

  # Optional: serve the landing page as part of the same stack.
  # Alternatively deploy it as a separate Dokploy Application (see DOKPLOY.md).
  landing:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.landing
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - dokploy-network
      - default

networks:
  dokploy-network:
    external: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
