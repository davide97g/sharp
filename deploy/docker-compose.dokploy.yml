# sharp — Dokploy compose file (split deployment: 3 subdomains)
#
# Dokploy runs its own Traefik reverse proxy with automatic HTTPS, so this file
# has NO caddy and publishes NO host ports. Route traffic via Dokploy's
# "Domains" tab (one domain per service):
#
#   sharp.davideghiotto.it          -> service `landing`, port 80
#   app.sharp.davideghiotto.it      -> service `web`,     port 80
#   server.sharp.davideghiotto.it   -> service `sharp`,   port 3000  (websockets work out of the box)
#
# The web SPA is a separate static image that talks cross-origin to the API host
# (baked in via API_URL below). Server CORS is permissive + auth is a Bearer token,
# so cross-origin works with no extra config.
#
# Dokploy setup: see deploy/DOKPLOY.md

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sharp
      POSTGRES_DB: sharp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharp -d sharp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # Object storage for file uploads. Internal only — sharp streams files through
  # its own API, so MinIO needs no Domain/public port. To use an external
  # S3/R2/B2 instead, delete this service + createbuckets and point the S3_*
  # vars on `sharp` at your provider.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sharp}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY in the Environment tab}
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-sharp} ${S3_SECRET_KEY}; do echo 'waiting for minio'; sleep 1; done;
      mc mb -p local/${S3_BUCKET:-sharp} || true;
      exit 0;
      "

  # API server (API-only image; the web SPA is the separate `web` service below).
  # Domain: server.sharp.davideghiotto.it -> port 3000.
  sharp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://sharp:${POSTGRES_PASSWORD}@postgres:5432/sharp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SHARP_DISABLE_SIGNUP: ${SHARP_DISABLE_SIGNUP:-false}
      RUST_LOG: ${RUST_LOG:-info}
      # File uploads (S3-compatible object storage — MinIO above).
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-sharp}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-sharp}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ALLOW_HTTP: "true"
      # Web push: VAPID keys auto-generate + persist on first startup. Only the
      # subject (contact URL) is configurable here.
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@sharp.davideghiotto.it}
      # GIF search (server-side proxy). Key can also be saved from the in-app
      # Settings → Workspace tab (persisted in Postgres); these are the env
      # fallbacks. GIPHY is the default provider; Tenor is legacy-only.
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
      TENOR_API_KEY: ${TENOR_API_KEY:-}
      # Duck GIF suggestions (DeepSeek LLM) — duck is disabled when unset.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - dokploy-network
      - default

  # Web SPA (static, nginx). The API base is baked in at build time — point it at
  # the API host's public URL. Domain: app.sharp.davideghiotto.it -> port 80.
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_URL: ${API_URL:-https://server.sharp.davideghiotto.it}
        # tldraw license key (removes the canvas watermark). Baked into the public
        # client bundle at build time, so it is not a secret. Override in the
        # Dokploy Environment tab if the key is rotated.
        VITE_TLDRAW_LICENSE_KEY: ${TLDRAW_LICENSE_KEY:-tldraw-2026-07-29/WyJJNFNEa0RIbCIsWyIqIl0sMTYsIjIwMjYtMDctMjkiXQ.HI3ay8fvFOqy6cMFRvrk5FpR1JmkiGpCb+50LFn/AWXVSf/1aeQJAHsnEFHJZ1X5By52D7ZRDNVB+6cRC3rhaQ}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - dokploy-network
      - default

  # Static landing page. Domain: sharp.davideghiotto.it (apex) -> port 80.
  landing:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.landing
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - dokploy-network
      - default

  # Always-on maintenance fallback for the app host. It owns a Traefik router on
  # the SAME host as `web`, but with the lowest priority (1). Whenever `web` is
  # up, its higher-priority router wins and this one is idle; when `web` goes
  # down (redeploy, crash), web's docker router disappears and Traefik falls back
  # to this router, serving deploy/maintenance.html with a 503. No manual steps,
  # no changes to the web/API/landing routes. Flips back automatically when web
  # returns.
  #
  # NOTE: `websecure` (entrypoint) and `letsencrypt` (certresolver) are Dokploy's
  # Traefik defaults. If your instance renamed them, change them below only.
  maintenance:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.maintenance
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - "traefik.http.routers.sharp-maint.rule=Host(`app.sharp.davideghiotto.it`)"
      - traefik.http.routers.sharp-maint.entrypoints=websecure
      - traefik.http.routers.sharp-maint.tls=true
      - traefik.http.routers.sharp-maint.tls.certresolver=letsencrypt
      - traefik.http.routers.sharp-maint.priority=1
      - traefik.http.routers.sharp-maint.service=sharp-maint
      - traefik.http.services.sharp-maint.loadbalancer.server.port=80

networks:
  dokploy-network:
    external: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
