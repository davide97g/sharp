# sharp — local development dependencies (Postgres + Redis + MinIO + LiveKit).
#
# Run the server and web app on the host; point them at these:
#     DATABASE_URL=postgres://sharp:sharp@localhost:5432/sharp
#     REDIS_URL=redis://localhost:6379
#     LIVEKIT_URL=ws://localhost:7880
#     LIVEKIT_INTERNAL_URL=http://localhost:7880
#     LIVEKIT_API_KEY=devkey
#     LIVEKIT_API_SECRET=secret
#
#     docker compose -f docker-compose.dev.yml up -d

services:
  livekit:
    image: livekit/livekit-server:v1.13.1
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sharp
      POSTGRES_PASSWORD: sharp
      POSTGRES_DB: sharp
    ports:
      - "5432:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharp -d sharp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # S3-compatible object storage for file uploads.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sharp
      MINIO_ROOT_PASSWORD: sharp-secret
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - minio_dev_data:/data

  # One-shot: create the 'sharp' bucket once MinIO is up.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 sharp sharp-secret; do echo 'waiting for minio'; sleep 1; done;
      mc mb -p local/sharp || true;
      exit 0;
      "

volumes:
  pg_dev_data:
  minio_dev_data:
