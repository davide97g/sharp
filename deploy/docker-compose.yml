# sharp — production stack for a single VPS.
#
#   1. Copy .env.example to .env and set strong secrets + your domain(s).
#   2. docker compose up -d
#
# Caddy (below) is OPTIONAL: it terminates TLS and reverse-proxies the app + serves
# the landing page. If you already run a reverse proxy, delete the `caddy` service
# and publish sharp directly by uncommenting its `ports:` line.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sharp
      POSTGRES_DB: sharp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharp -d sharp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Object storage for file uploads. Point sharp at an external S3/R2/B2 instead
  # by removing this service and setting S3_* to your provider's values.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sharp}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-sharp} ${S3_SECRET_KEY}; do echo 'waiting for minio'; sleep 1; done;
      mc mb -p local/${S3_BUCKET:-sharp} || true;
      exit 0;
      "

  sharp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgres://sharp:${POSTGRES_PASSWORD}@postgres:5432/sharp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      PORT: 3000
      WEB_DIST: /app/web-dist
      SHARP_DISABLE_SIGNUP: ${SHARP_DISABLE_SIGNUP:-false}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_ORIGINS: ${WEBAUTHN_ORIGINS:-}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-Sharp}
      RUST_LOG: ${RUST_LOG:-info}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-sharp}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-sharp}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ALLOW_HTTP: "true"
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@sharp.app}
      # Sharpy AI assistant (OpenAI-compatible LLM + embeddings) — disabled when
      # AI_API_KEY is unset. Base URL works with OpenAI, DeepSeek, Ollama, etc.
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4o-mini}
      AI_EMBED_MODEL: ${AI_EMBED_MODEL:-text-embedding-3-small}
      # Google Calendar (Phase 5) — optional. Leave unset to disable calendar sync.
      # GOOGLE_REDIRECT_URI must exactly match a redirect registered on the OAuth
      # client, pointing at this API origin: https://<domain>/api/v1/calendar/google/callback
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
    # Expose sharp directly instead of going through Caddy by uncommenting:
    # ports:
    #   - "3000:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - sharp
    ports:
      - "80:80"
      - "443:443"
    environment:
      SHARP_DOMAIN: ${SHARP_DOMAIN}
      LANDING_DOMAIN: ${LANDING_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../landing/dist:/srv/landing:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
