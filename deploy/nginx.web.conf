server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the service worker or the app shell, so updates land promptly.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: unknown paths render the app shell (client-side routing).
    location / {
        try_files $uri /index.html;
    }
}
